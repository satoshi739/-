# リールターゲット層定義
# video/script_generator.py でターゲット指定時に参照する

beginner:
  label: 物販初心者
  pain_points:
    - お金がなくて仕入れに踏み出せない
    - 時間がなくてどこから始めればいいか分からない
    - 失敗したときのリスクが怖い
  vocabulary:
    - 副業
    - 在宅ワーク
    - お小遣い稼ぎ
    - 初心者でもできる
    - スマホ一台で
    - 月数万円
  tone:
    - 親しみやすく話しかけるような口調
    - 「大丈夫、私も最初はそうでした」的な共感
    - 小さな希望を積み重ねて背中を押す
  example_phrases:
    - "最初は3,000円から始めてOKです"
    - "スマホだけで今日から副収入が作れます"
    - "私も最初は何から始めるか全然分かりませんでした"

intermediate:
  label: 物販経験者（疲弊層）
  pain_points:
    - リサーチに毎日2〜3時間取られて疲弊している
    - 売上は立っているが利益率が頭打ちで伸びない
    - ライバルに先を越されて仕入れ負けする
  vocabulary:
    - せどり
    - リサーチ
    - 仕入れ
    - 利益率
    - 回転率
    - ランキング
    - 相場
  tone:
    - 同じ実践者目線で「わかるわかる」の共感
    - 問題を具体的に言語化して「それ、解決できます」
    - 数字・根拠を示して信頼感を出す
  example_phrases:
    - "リサーチ3時間→30分に縮めた方法を話します"
    - "利益率が頭打ちなのはリサーチ軸が間違っているだけ"
    - "同じ仕入れ額で利益を1.5倍にした仕組みがあります"

advanced:
  label: 月50万以上プレイヤー
  pain_points:
    - 売上は伸びているが自分の工数が増える一方でスケールできない
    - 複数アカウント・複数店舗の管理が煩雑になっている
    - 外注・自動化の仕組みを作りたいが何から手をつければいいか分からない
  vocabulary:
    - 自動化
    - 効率化
    - 外注化
    - 仕組み化
    - 複数垢
    - 月次粗利
    - KPI
    - スケール
  tone:
    - 結論ファーストで余計な前置きなし
    - データ・再現性・構造で話す
    - 「知ってる人には当たり前」の前提で話す
  example_phrases:
    - "月100万の壁はリサーチの外注化で超えられます"
    - "複数アカウント管理を一元化した仕組みを公開します"
    - "自分の作業ゼロで回るフローの作り方、解説します"
