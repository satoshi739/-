# リールフォーマット定義
# video/script_generator.py でフォーマット指定時に参照する

profit_reveal:
  description: 実際の利益金額を公開して興味を引く「この商品で○○円儲かった」型
  structure:
    - "シーン1 フック: 利益金額をズバリ提示（例: 先月この商品で38,000円の利益）"
    - "シーン2 商品紹介: 何の商品か・どこで仕入れたかを簡潔に説明"
    - "シーン3 数字の根拠: 仕入れ値・売値・利益率を画面テキストで見せる"
    - "シーン4 再現ポイント: 同じ結果を出すために必要な1〜2のポイントを提示"
    - "シーン5 CTA: cta_library.yaml から指定されるCTA(保存/フォロー/コメントのいずれか)を入れる"
  hook_examples:
    - "この商品1個で38,000円の利益出ました"
    - "仕入れ2,000円→売値24,000円、利益22,000円の現実"
    - "先月この方法で副業収入が83,000円になった話します"

howto:
  description: 具体的なノウハウを番号付きで伝える「○○の見つけ方3選」型
  structure:
    - "シーン1 フック: 何が学べるかと件数を提示（例: 稼げる商品の見つけ方3選）"
    - "シーン2 ポイント1: 最も効果的な方法を具体的に説明"
    - "シーン3 ポイント2: 次に重要な方法、前との違いも添える"
    - "シーン4 ポイント3: 上級者向けや組み合わせ技を紹介"
    - "シーン5 CTA: cta_library.yaml から指定されるCTA(保存/フォロー/コメントのいずれか)を入れる"
  hook_examples:
    - "仕入れで失敗しない商品の選び方3選、保存して"
    - "これ知らないと一生リサーチで時間溶かします"
    - "月10万稼ぐ人がやっているリサーチ法、3つだけ"

failure_story:
  description: 自分の失敗体験を正直に話して共感と信頼を獲得する「手作業で月20時間溶かした話」型
  structure:
    - "シーン1 フック: 損失・失敗の数字を提示（時間・金額）で引きつける"
    - "シーン2 状況説明: 当時どんな状況だったか・何をしていたか"
    - "シーン3 失敗の核心: 何が間違っていたのかを正直に話す"
    - "シーン4 転換点: どう気づいて・何を変えたか"
    - "シーン5 CTA: cta_library.yaml から指定されるCTA(保存/フォロー/コメントのいずれか)を入れる"
  hook_examples:
    - "手作業のリサーチで月20時間溶かしてた頃の話します"
    - "仕入れミスで15万円の在庫抱えた失敗、正直に話します"
    - "半年間ほぼ利益ゼロだった私が変えたたった1つのこと"

before_after:
  description: ツールや方法の導入前後を対比して効果を視覚的に伝える型
  structure:
    - "シーン1 フック: 「Before→After」の結果を一言で提示"
    - "シーン2 Before: 導入前の状態・作業量・数字を具体的に見せる"
    - "シーン3 転換: 何を変えたか・何を導入したかをシンプルに説明"
    - "シーン4 After: 導入後の状態・改善された数字を対比で見せる"
    - "シーン5 CTA: cta_library.yaml から指定されるCTA(保存/フォロー/コメントのいずれか)を入れる"
  hook_examples:
    - "リサーチ時間、3時間→20分になった話します"
    - "ツール使う前と後、利益率がこんなに変わった"
    - "この方法に変えてから月収が2.3倍になった理由"

ranking:
  description: 順位形式で複数の情報を伝える「今月儲かるジャンルTOP5」型
  structure:
    - "シーン1 フック: 何のランキングか・なぜ今有益かを提示"
    - "シーン2 5位〜3位: 下位ランクを手早く紹介（各1〜2秒）"
    - "シーン3 2位: 少し詳しく・なぜ2位かの理由を添える"
    - "シーン4 1位: 最も重要な内容をしっかり説明"
    - "シーン5 CTA: cta_library.yaml から指定されるCTA(保存/フォロー/コメントのいずれか)を入れる"
  hook_examples:
    - "今月せどりで稼げるジャンルTOP5、発表します"
    - "利益率が高い商品カテゴリランキング、1位は意外です"
    - "初心者が最初に参入すべきジャンル、ランキングで解説"
