# LINE自動返信シナリオ設定
# キーワードが含まれるメッセージに自動返信する

brand: dsc-marketing   # dsc-marketing / cashflowsupport / upjapan

# --- キーワード自動返信 ---
keyword_replies:

  # DSc Marketing
  - keywords: ["マーケ", "集客", "SNS", "インスタ", "Instagram", "LINE", "ホームページ", "HP", "Web"]
    reply: |
      メッセージありがとうございます！
      DSc Marketing です😊

      SNS・LINE・Webをつないだ集客の仕組みづくりをご支援しています。

      まずどんなお悩みがあるか、もう少し教えてもらえますか？
      ・今どんな集客方法を使っていますか？
      ・一番困っていることは何ですか？

      お気軽にどうぞ！

  # cashflowsupport
  - keywords: ["ファクタリング", "資金", "売掛", "キャッシュ", "資金繰り", "急ぎ", "お金"]
    reply: |
      メッセージありがとうございます。
      cashflowsupport です。

      資金繰りについてのご相談ですね。
      状況を少し教えていただけますか？

      ・おおよその売掛金額
      ・いつごろ資金が必要か

      内容を確認してから、できることをお伝えします。
      無理に契約を勧めることはないので、安心してご相談ください。

  # 一般的な問い合わせ
  - keywords: ["相談", "問い合わせ", "教えて", "聞きたい", "詳しく"]
    reply: |
      メッセージありがとうございます！

      どのようなことでしょうか？
      詳しく教えていただけると、適切な担当からご返信できます😊

# --- 初回登録時のウェルカムメッセージ ---
welcome_message: |
  友だち登録ありがとうございます！

  株式会社ユニバースプラネットジャパン（UPJ）です。

  ▼ UPJグループのサービス
  📊 DSc Marketing — SNS・LINE・Web集客の仕組みづくり
  💰 cashflowsupport — ファクタリング・資金繰り相談
  🏢 UPJ — 事業設計・コンサルティング

  気になるサービスや、お困りのことをお気軽にメッセージください。
  平日10:00〜17:00 で対応しています。

# --- フォローアップメッセージ ---
followup_messages:
  first: |
    先日はメッセージありがとうございました！

    その後、お役に立てることはありましたか？
    何かご質問があればいつでもお声がけください😊

  second: |
    こんにちは！UPJです。

    もしよろしければ、15〜30分ほどお時間をいただき、
    現状のお話を聞かせていただけますか？

    無料でご相談をお受けしています。
    ご都合のよい日時を教えてください📅

  final: |
    お時間をいただきありがとうございました。

    今後もお役に立てることがあれば、いつでもご連絡ください。
    引き続きよろしくお願いします！
