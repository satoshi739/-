# 禁止キーワード — SNS投稿前バリデーションで使用
# 売り込み・直接誘導・限定煽りのあるキーワードを定義する
# 追加は keywords: リストに追記するだけでよい

keywords:
  # プロフ誘導系
  - プロフ
  - プロフィール
  - リンクはプロフ
  - プロフにリンク
  - プロフへ
  - プロフ欄
  # DM誘導系
  - DM
  - DMください
  - DMして
  - DMで送ります
  - DMお待ち
  # URL・誘導系
  - 詳細はこちら
  - 登録はこちら
  - こちらから登録
  - 詳しくはURL
  # LINE誘導系
  - 公式LINE
  - LINEで受け取る
  - LINE登録
  - LINEはこちら
  # 限定煽り系
  - 今だけ
  - 限定価格
  - 期間限定
  - 残り僅か
  - 先着
