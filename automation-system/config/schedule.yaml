# 投稿スケジュール設定
# time は JST（日本時間）で指定

instagram:
  enabled: true
  # 1日1回 or 複数回指定できる
  post_times:
    - "12:00"   # 昼
    - "19:00"   # 夜（2本投稿する場合は2つ書く。1本なら1つだけ）

line_broadcast:
  enabled: true
  # LINE一斉配信（週1〜2回程度が理想）
  weekdays: ["monday", "thursday"]   # 月・木
  time: "10:00"

followup:
  # リード獲得後のフォローアップ送信タイミング（時間後）
  first_followup_hours: 24      # 1日後
  second_followup_hours: 72     # 3日後
  final_followup_hours: 168     # 7日後
