<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — UPJ Dashboard</title>
  <script src="https://unpkg.com/lucide@1.14.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg:      #000000;
      --s1:      #1C1C1E;
      --s2:      #2C2C2E;
      --border:  rgba(255,255,255,.1);
      --border2: rgba(255,255,255,.18);
      --accent:  #0A84FF;
      --text:    #FFFFFF;
      --muted:   rgba(255,255,255,.28);
      --muted2:  rgba(255,255,255,.55);
      --radius:  16px;
      --danger:  #FF453A;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'SF Pro Display', 'Hiragino Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 52px;
      height: 52px;
      background: #0A84FF;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 14px;
      color: #fff;
    }
    .logo h1 {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    .logo p {
      font-size: 13px;
      color: var(--muted2);
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted2);
      margin-bottom: 7px;
      letter-spacing: .3px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      margin-bottom: 18px;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: rgba(10,132,255,.6);
      box-shadow: 0 0 0 3px rgba(10,132,255,.15);
    }
    input::placeholder { color: var(--muted); }
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #0A84FF;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    button[type="submit"]:hover { background: #409CFF; transform:translateY(-1px); }
    button[type="submit"]:active { transform:translateY(0); }
    .error {
      background: rgba(255,69,58,.1);
      border: 1px solid rgba(255,69,58,.25);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }
    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon"><span style="display:inline-flex;align-items:center;"><i data-lucide="building"></i></span></div>
      <h1>UPJ Dashboard</h1>
      <p>管理者アカウントでログインしてください</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="username">ユーザー名</label>
      <input type="text" id="username" name="username"
             placeholder="admin" autofocus autocomplete="username">
      <label for="password">パスワード</label>
      <input type="password" id="password" name="password"
             placeholder="••••••••" autocomplete="current-password">
      <button type="submit">ログイン</button>
    </form>

    <div class="footer">UPJ Automation System</div>
  </div>

  <script>
    lucide.createIcons();
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') e.target.form.submit();
    });
  </script>
</body>
</html>
